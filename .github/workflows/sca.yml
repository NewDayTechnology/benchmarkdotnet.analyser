name: SCA

permissions: # set permissions to principle of least privilege, codeql requires read permission to the repo content and PRs (if that option is set), and must have write permissions to security events in order to push results
  actions: read
  pull-requests: write
  security-events: write
  contents: write
  checks: write

on:
  workflow_call:
  workflow_dispatch:
  schedule:
    # Runs at 00:00 every day
    - cron: '0 0 * * *'

env:
  SOLUTION_NAME: benchmarkdotnetanalyser.sln
  
jobs:
  dotnet-sca:
    name: Dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Dependency scan
        uses: tonycknight/pkgchk-action@v1
        with: 
          project-path: ${{ env.SOLUTION_NAME }}
          scan-issues: true
          deprecated: true
          vulnerable: true
          transitives: true
          fail-on-critical: true
          fail-on-high: true
          fail-on-moderate: true
          fail-on-legacy: true
          scan-upgrades: true
          fail-on-upgrades: false
